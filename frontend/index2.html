<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infera Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style2.css">
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <!-- Marked.js for Markdown parsing -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="brand">
            <div class="brand-icon">
                <i class="ph ph-rocket-launch"></i>
            </div>
            Infera
        </div>
        
        <ul class="nav-links">
            <li class="nav-item active">
                <i class="ph ph-squares-four"></i>
                Dashboard
            </li>
            <!--
            <li class="nav-item">
                <i class="ph ph-chart-line-up"></i>
                Analytics
            </li>
            -->
            <li class="nav-item">
                <i class="ph ph-file-text"></i>
                Reports
            </li>
            <!--
            <li class="nav-item">
                <i class="ph ph-folder-notch"></i>
                Projects
            </li>
            <li class="nav-item">
                <i class="ph ph-gear"></i>
                Settings
            </li>
            -->
        </ul>
    </aside>

    <!-- Main Wrapper -->
    <div class="main-wrapper">
        <!-- Header -->
        <header class="header">
        </header>

        <!-- Main Content -->
        <main class="content">
            <div id="page-dashboard" class="page-section">
                <h1 class="page-title" style="display:none;">Dashboard</h1>
                
                <div class="dashboard-header" style="display: flex; gap: 2rem; margin-bottom: 2rem; align-items: stretch;">
                    <!-- Manual Trigger Form -->
                    <div class="card" style="flex: 1;">
                        <div class="card-header" style="margin-bottom: 1.25rem; color: var(--text-muted); font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em;">
                            Manual Trigger
                            <div class="card-icon"><i class="ph ph-rocket-launch"></i></div>
                        </div>
                        <form id="analyze-form" class="analyze-form" style="display: flex; flex-direction: column; gap: 1rem;">
                            <input type="text" id="competitor-name" placeholder="Competitor Name (e.g. Acme Corp)" required class="form-input">
                            <input type="text" id="analyze-question" placeholder="Specific question (e.g. What is their pricing?)" required class="form-input">
                            <button type="submit" class="btn-primary" style="margin-top: 0.5rem; align-self: flex-start;">
                                <i class="ph ph-play"></i> Analyze
                            </button>
                        </form>
                    </div>
                    
                    <div class="card" style="flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;">
                        <i class="ph ph-chart-line-up" style="font-size: 3rem; color: var(--accent-bright); margin-bottom: 1rem; opacity: 0.5;"></i>
                        <h3 style="color: #fff; font-weight: 700; font-size: 1rem; letter-spacing: -0.02em;">System Ready</h3>
                        <p style="color: var(--text-muted); font-size: 0.85rem; margin-top: 0.4rem; line-height: 1.6;">Enter a competitor and question to launch the intelligence pipeline.</p>
                    </div>
                </div>

                <div id="pipeline-container"></div>

                <!-- Health + Competitor Config Row -->
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.5rem;">
                    <div id="health-panel" class="card">
                        <!-- Populated by health.js -->
                        <div class="card-header">System Health <div class="card-icon" style="background: rgba(255,255,255,0.04); color: var(--text-muted);"><i class="ph ph-heartbeat"></i></div></div>
                        <div style="color: var(--text-muted); font-size: 0.8rem; text-align: center; padding: 1.5rem 0;">Connecting...</div>
                    </div>
                    <div id="competitor-config" class="card">
                        <!-- Populated by competitors.js -->
                    </div>
                </div>

            <!-- Activity Feed Area -->
            <div class="main-chart">
                <div class="chart-header">
                    <div class="chart-title">Live Activity Feed</div>
                    <i class="ph ph-dots-three-outline-vertical" style="color: var(--text-muted); cursor: pointer;"></i>
                </div>
                <div id="activity-feed" style="flex: 1; display: flex; flex-direction: column; gap: 0.75rem; overflow-y: auto;">
                    <!-- Activity logs injected by activity.js -->
                </div>
            </div>
            </div> <!-- End Dashboard Page -->

            <div id="page-reports" class="page-section" style="display: none;">
                <h1 class="page-title">Intelligence Reports</h1>
                <div id="reports-list"></div>
                <div id="report-detail" style="display: none;"></div>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="js/pipeline.js"></script>
    <script src="js/activity.js"></script>
    <script src="js/websocket.js"></script>
    <script src="js/reports.js"></script>
    <script src="js/health.js"></script>
    <script src="js/competitors.js"></script>
    <script src="js/app2.js"></script>
</body>
</html>
