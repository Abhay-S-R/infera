<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ascent Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>
    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="brand">
            <div class="brand-icon">
                <i class="ph ph-rocket-launch"></i>
            </div>
            Ascent
        </div>
        
        <ul class="nav-links">
            <li class="nav-item active">
                <i class="ph ph-squares-four"></i>
                Dashboard
            </li>
            <li class="nav-item">
                <i class="ph ph-chart-line-up"></i>
                Analytics
            </li>
            <li class="nav-item">
                <i class="ph ph-users"></i>
                Customers
            </li>
            <li class="nav-item">
                <i class="ph ph-folder-notch"></i>
                Projects
            </li>
            <li class="nav-item">
                <i class="ph ph-gear"></i>
                Settings
            </li>
        </ul>
    </aside>

    <!-- Main Wrapper -->
    <div class="main-wrapper">
        <!-- Header -->
        <header class="header">
            <div class="search-bar">
                <i class="ph ph-magnifying-glass"></i>
                <input type="text" placeholder="Search anything...">
            </div>

            <div class="header-actions">
                <button class="icon-btn">
                    <i class="ph ph-bell"></i>
                    <span class="notification-badge"></span>
                </button>
                <button class="icon-btn">
                    <i class="ph ph-chat-circle-text"></i>
                </button>
                <div class="user-profile">
                    <div class="avatar"></div>
                    <i class="ph ph-caret-down" style="color: var(--text-muted); font-size: 0.8rem;"></i>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="content">
            <h1 class="page-title">Overview</h1>
            
            <div id="pipeline-container"></div>

            <div class="grid-cards">
                <!-- Card 1 -->
                <div class="card">
                    <div class="card-header">
                        Total Revenue
                        <div class="card-icon">
                            <i class="ph ph-currency-dollar"></i>
                        </div>
                    </div>
                    <div class="card-value">$48,290</div>
                    <div class="card-trend trend-up">
                        <i class="ph ph-trend-up"></i>
                        <span>+12.5% from last month</span>
                    </div>
                </div>

                <!-- Card 2 -->
                <div class="card">
                    <div class="card-header">
                        Active Users
                        <div class="card-icon" style="color: #10b981; background: rgba(16, 185, 129, 0.1);">
                            <i class="ph ph-users"></i>
                        </div>
                    </div>
                    <div class="card-value">2,405</div>
                    <div class="card-trend trend-up">
                        <i class="ph ph-trend-up"></i>
                        <span>+5.2% from last month</span>
                    </div>
                </div>

                <!-- Card 3 -->
                <div class="card">
                    <div class="card-header">
                        Bounce Rate
                        <div class="card-icon" style="color: #ef4444; background: rgba(239, 68, 68, 0.1);">
                            <i class="ph ph-chart-line-down"></i>
                        </div>
                    </div>
                    <div class="card-value">24.5%</div>
                    <div class="card-trend trend-down">
                        <i class="ph ph-trend-down"></i>
                        <span>-1.2% from last month</span>
                    </div>
                </div>
            </div>

            <!-- Activity Feed Area -->
            <div class="main-chart">
                <div class="chart-header">
                    <div class="chart-title">Activity Feed</div>
                    <i class="ph ph-dots-three-outline-vertical" style="color: var(--text-muted); cursor: pointer;"></i>
                </div>
                <div id="activity-feed" style="flex: 1; display: flex; flex-direction: column; gap: 0.5rem; overflow-y: auto;">
                    <!-- Activity logs injected by websocket.js -->
                </div>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="js/pipeline.js"></script>
    <script src="js/websocket.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
